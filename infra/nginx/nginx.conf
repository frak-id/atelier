# --------------------------------------------------------------------------
# Atelier Dashboard — nginx reverse proxy + SPA serving
#
# Runs as a sidecar in the same K8s pod as the manager.
# Serves dashboard static files directly, proxies backend paths to
# the Elysia manager on localhost:4000.
#
# Port: 8080 (unprivileged)
# --------------------------------------------------------------------------

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # ── Hashed Vite assets (immutable, long cache) ────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend paths → manager on localhost:4000 ─────────────────────────
    #
    # Single block for all API/backend routes. SSE (/api/events/) and
    # MCP (/mcp) need buffering disabled and long read timeouts — this
    # is harmless for regular REST calls so we keep one unified block.
    location ~ ^/(api|auth|health|config|internal|swagger|mcp|integrations)(/|$) {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / StreamableHTTP support (events, MCP)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }
}
