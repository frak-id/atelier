# --------------------------------------------------------------------------
# Atelier — production values example
#
# Copy this file, fill in the REQUIRED fields, then install:
#
#   helm install atelier oci://ghcr.io/frak-id/charts/atelier \
#     --namespace atelier-system --create-namespace \
#     --values values.production.yaml
# --------------------------------------------------------------------------

# -- Domain & TLS (REQUIRED)
domain:
  baseDomain: "example.com"
  # Dashboard will be available at sandbox.example.com
  # Sandbox dev servers at dev-{name}-{id}.example.com
  tls:
    email: "admin@example.com"

# -- Authentication (REQUIRED)
auth:
  github:
    clientId: "Iv1.xxxxxxxxxxxxxxxx"
    clientSecret: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # Auto-generated if empty, but set explicitly for pod restarts
  jwtSecret: "change-me-to-a-random-64-char-string"
  # Restrict access to a GitHub org (recommended)
  allowedOrg: "your-org"
  # Or restrict to specific users
  # allowedUsers:
  #   - "username1"
  #   - "username2"

# -- Server settings
server:
  port: 4000
  maxSandboxes: 20
  maxActiveTasks: 10
  # mcpToken: "bearer-token-for-mcp-api"

# -- Manager
manager:
  image:
    repository: ghcr.io/frak-id/atelier-manager
    # tag: "" — defaults to Chart.appVersion
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  persistence:
    size: 1Gi
    # storageClass: "local-path"

# -- Ingress
ingress:
  className: traefik
  # annotations:
  #   traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

# -- Kubernetes settings
kubernetes:
  namespace: atelier-sandboxes
  runtimeClass: kata-clh
  # storageClass: "topolvm-provisioner"
  # volumeSnapshotClass: "topolvm-snapshot"
  defaultVolumeSize: "20Gi"

# -- Sandbox defaults
sandbox:
  defaultImage: dev-base
  git:
    email: sandbox@atelier.dev
    name: Sandbox User

# -- Zot OCI registry (base images)
zot:
  enabled: true
  persistence:
    size: 50Gi
    # storageClass: "local-path"

# -- cert-manager (wildcard certs via Cloudflare DNS-01)
certManager:
  enabled: true
  issuer:
    name: letsencrypt-prod
    server: https://acme-v02.api.letsencrypt.org/directory
    solver: cloudflare
    cloudflare:
      apiTokenSecretRef:
        # Create this secret before installing:
        #   kubectl create secret generic cloudflare-api-token \
        #     --namespace atelier-system \
        #     --from-literal=api-token=YOUR_CLOUDFLARE_API_TOKEN
        name: cloudflare-api-token
        key: api-token

# -- Kata Containers
kata:
  createRuntimeClass: true
  handler: kata-clh

# -- Sandbox secrets encryption key (REQUIRED for production)
secrets:
  encryptionKey: "change-me-to-a-random-32-char-hex"

# -- Integrations (optional)
# integrations:
#   slack:
#     enabled: true
#     botToken: "xoxb-..."
#     signingSecret: "..."
