{{- if .Values.sshpiper.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipes.sshpiper.com
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
    app.kubernetes.io/component: sshpiper
spec:
  group: sshpiper.com
  names:
    kind: Pipe
    listKind: PipeList
    plural: pipes
    singular: pipe
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              from:
                items:
                  properties:
                    authorized_keys_data:
                      type: string
                    authorized_keys_secret:
                      properties:
                        name:
                          type: string
                      type: object
                    username:
                      type: string
                    username_regex_match:
                      type: boolean
                  required:
                  - username
                  type: object
                type: array
              to:
                properties:
                  host:
                    type: string
                  ignore_hostkey:
                    type: boolean
                  private_key_secret:
                    properties:
                      name:
                        type: string
                    type: object
                  username:
                    type: string
                required:
                - host
                type: object
            required:
            - from
            - to
            type: object
        required:
        - spec
        type: object
    additionalPrinterColumns:
    - jsonPath: .spec.from[0].username
      name: FromUser
      type: string
    - jsonPath: .spec.to.host
      name: ToHost
      type: string
    served: true
    storage: true
{{- end }}
