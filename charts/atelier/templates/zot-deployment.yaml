{{- if .Values.zot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "atelier.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: zot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: zot
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: zot
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zot
          image: {{ printf "%s:%s" .Values.zot.image.repository .Values.zot.image.tag }}
          imagePullPolicy: {{ .Values.zot.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.zot.port }}
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.zot.resources | nindent 12 }}
          volumeMounts:
            - name: zot-data
              mountPath: /var/lib/zot
      volumes:
        - name: zot-data
          persistentVolumeClaim:
            claimName: zot-data
{{- end }}
