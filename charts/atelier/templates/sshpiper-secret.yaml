{{- if .Values.sshpiper.enabled }}
{{- $secretName := printf "%s-sshpiper-server-key" (include "atelier.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $serverKey := "" -}}
{{- if $existing -}}
  {{- $serverKey = index $existing.data "server_key" | default "" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
    app.kubernetes.io/component: sshpiper
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $serverKey }}
  server_key: {{ $serverKey }}
  {{- else }}
  server_key: {{ genPrivateKey "ed25519" | b64enc | quote }}
  {{- end }}
{{- end }}
