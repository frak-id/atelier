{{- if .Values.domain.baseDomain }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "atelier.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: {{ include "atelier.dashboardDomain" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "atelier.fullname" . }}-manager
                port:
                  number: 4000
  tls:
    - secretName: {{ include "atelier.wildcardTlsSecretName" . }}
      hosts:
        - {{ include "atelier.dashboardDomain" . }}
{{- end }}
