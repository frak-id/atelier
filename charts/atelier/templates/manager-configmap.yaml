apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "atelier.fullname" . }}-manager-config
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
data:
  sandbox.config.json: |
    {{- $dashboardDomain := include "atelier.dashboardDomain" . -}}
    {{- $config := dict
      "domain" (dict
        "baseDomain" .Values.domain.baseDomain
        "dashboard" $dashboardDomain
        "tls" (dict "email" .Values.domain.tls.email)
        "ssh" (dict "port" 2222)
      )
      "auth" (dict
        "allowedOrg" .Values.auth.allowedOrg
        "allowedUsers" .Values.auth.allowedUsers
      )
      "server" (dict
        "mode" "production"
        "port" .Values.server.port
        "host" "0.0.0.0"
        "maxSandboxes" .Values.server.maxSandboxes
        "maxActiveTasks" .Values.server.maxActiveTasks
      )
      "kubernetes" (dict
        "namespace" .Values.kubernetes.namespace
        "systemNamespace" .Release.Namespace
        "runtimeClass" .Values.kubernetes.runtimeClass
        "ingressClassName" .Values.ingress.className
        "registryUrl" (printf "%s-zot.%s.svc:%v" (include "atelier.fullname" .) .Release.Namespace .Values.zot.port)
        "verdaccioUrl" (printf "http://%s-verdaccio.%s.svc:%v" (include "atelier.fullname" .) .Release.Namespace .Values.ports.verdaccio)
        "storageClass" .Values.kubernetes.storageClass
        "volumeSnapshotClass" .Values.kubernetes.volumeSnapshotClass
        "defaultVolumeSize" .Values.kubernetes.defaultVolumeSize
        "vsCodeIngressAnnotations" (include "atelier.vsCodeIngressAnnotations" . | fromJson)
        "openCodeIngressAnnotations" (include "atelier.openCodeIngressAnnotations" . | fromJson)
      )
      "sandbox" (dict
        "defaultImage" .Values.sandbox.defaultImage
        "git" (dict
          "email" .Values.sandbox.git.email
          "name" .Values.sandbox.git.name
        )
      )
      "ports" .Values.ports
      "integrations" (dict
        "slack" (dict
          "enabled" .Values.integrations.slack.enabled
        )
        "cliproxy" (dict
          "url" (ternary (printf "http://%s-cliproxy.%s.svc:%v" (include "atelier.fullname" .) .Release.Namespace .Values.cliproxy.port) "" .Values.cliproxy.enabled)
          "apiKey" .Values.cliproxy.managerApiKey
        )
      )
    -}}
{{ $config | toPrettyJson | nindent 4 }}
