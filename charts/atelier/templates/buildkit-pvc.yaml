{{- if .Values.buildkit.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "atelier.fullname" . }}-buildkit-cache
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.buildkit.persistence.storageClass }}
  storageClassName: {{ .Values.buildkit.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.buildkit.persistence.size }}
{{- end }}
