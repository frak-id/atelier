apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "atelier.fullname" . }}-manager-data
  namespace: {{ include "atelier.systemNamespace" . }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.manager.persistence.storageClass }}
  storageClassName: {{ .Values.manager.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.manager.persistence.size }}
