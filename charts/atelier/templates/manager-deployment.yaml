apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  {{- with .Values.manager.updateStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "atelier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: manager
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/manager-configmap.yaml") . | sha256sum }}
        {{- with .Values.manager.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "atelier.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: manager
        {{- with .Values.manager.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "atelier.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "atelier.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nginx
          image: {{ include "atelier.dashboardImage" . }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- .Values.dashboard.resources | toYaml | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: manager
          image: {{ include "atelier.managerImage" . }}
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          command: ["bun", "server.js"]
          ports:
            - name: api
              containerPort: {{ .Values.server.port }}
          env:
            - name: ATELIER_SERVER_MODE
              value: production
            - name: DATA_DIR
              value: /app/data
            - name: MIGRATIONS_DIR
              value: /app/drizzle
            - name: ATELIER_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_GITHUB_CLIENT_ID
            - name: ATELIER_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_GITHUB_CLIENT_SECRET
            - name: ATELIER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_JWT_SECRET
            - name: SANDBOX_SECRETS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: SANDBOX_SECRETS_KEY
            {{- if .Values.server.mcpToken }}
            - name: ATELIER_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_MCP_TOKEN
            {{- end }}
            {{- if .Values.integrations.slack.enabled }}
            - name: ATELIER_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_SLACK_BOT_TOKEN
            - name: ATELIER_SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.managerSecretName" . }}
                  key: ATELIER_SLACK_SIGNING_SECRET
            {{- end }}
            {{- if .Values.cliproxy.enabled }}
            - name: ATELIER_CLIPROXY_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "atelier.fullname" . }}-cliproxy-secret
                  key: management-key
            {{- end }}
            - name: ATELIER_K8S_INGRESS_CLASS
              value: {{ .Values.ingress.className | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: api
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: manager-data
              mountPath: /app/data
            - name: manager-config
              mountPath: /etc/atelier/sandbox.config.json
              subPath: sandbox.config.json
              readOnly: true
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: manager-data
          persistentVolumeClaim:
            claimName: {{ include "atelier.fullname" . }}-manager-data
        - name: manager-config
          configMap:
            name: {{ include "atelier.fullname" . }}-manager-config
