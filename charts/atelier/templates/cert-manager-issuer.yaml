{{- if and .Values.certManager.enabled .Values.certManager.createIssuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.domain.tls.email | quote }}
    server: {{ .Values.certManager.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuerName }}-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.certManager.cloudflare.apiTokenSecretRef.name }}
              key: {{ .Values.certManager.cloudflare.apiTokenSecretRef.key }}
{{- end }}
