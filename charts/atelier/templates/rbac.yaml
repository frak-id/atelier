{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "atelier.serviceAccountName" . }}
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.rbac.create }}
{{- if .Values.serviceAccount.create }}
---
{{- end }}
# Cluster-scoped resources: PVs, RuntimeClasses, Namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["sshpiper.com"]
    resources: ["pipes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "atelier.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "atelier.serviceAccountName" . }}
    namespace: {{ include "atelier.systemNamespace" . }}
---
# System namespace: Verdaccio, Kaniko, shared-binaries (pods, services, configmaps, PVCs, jobs)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "atelier.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "atelier.serviceAccountName" . }}
    namespace: {{ include "atelier.systemNamespace" . }}
---
# Sandbox namespace: sandbox pods, services, PVCs, ingresses, jobs, snapshots, events
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.sandboxNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["sshpiper.com"]
    resources: ["pipes"]
    verbs: ["create", "get", "list", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "atelier.fullname" . }}-manager
  namespace: {{ include "atelier.sandboxNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "atelier.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "atelier.serviceAccountName" . }}
    namespace: {{ include "atelier.systemNamespace" . }}
{{- if .Values.runners.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "atelier.fullname" . }}-runner-monitor
  namespace: {{ .Values.runners.namespace }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "atelier.fullname" . }}-runner-monitor
  namespace: {{ .Values.runners.namespace }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "atelier.serviceAccountName" . }}
    namespace: {{ include "atelier.systemNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "atelier.fullname" . }}-runner-monitor
{{- end }}
{{- end }}
