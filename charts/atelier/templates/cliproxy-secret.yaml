{{- if .Values.cliproxy.enabled }}
{{- $secretName := printf "%s-cliproxy-secret" (include "atelier.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingKey := "" -}}
{{- $existingManagerKey := "" -}}
{{- if $existing -}}
{{- $existingKey = index $existing.data "management-key" | default "" -}}
{{- $existingManagerKey = index $existing.data "manager-api-key" | default "" -}}
{{- end -}}
{{- $mgmtKey := .Values.cliproxy.managementKey | default "" -}}
{{- if and (eq $mgmtKey "") (ne $existingKey "") -}}
{{- $mgmtKey = ($existingKey | b64dec) -}}
{{- end -}}
{{- if eq $mgmtKey "" -}}
{{- $mgmtKey = randAlphaNum 32 -}}
{{- end -}}
{{- $managerApiKey := .Values.cliproxy.managerApiKey | default "" -}}
{{- if and (eq $managerApiKey "") (ne $existingManagerKey "") -}}
{{- $managerApiKey = ($existingManagerKey | b64dec) -}}
{{- end -}}
{{- if eq $managerApiKey "" -}}
{{- $managerApiKey = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cliproxy
type: Opaque
data:
  management-key: {{ $mgmtKey | b64enc | quote }}
  manager-api-key: {{ $managerApiKey | b64enc | quote }}
{{- end }}
