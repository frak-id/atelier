{{- if not .Values.auth.existingSecret }}
{{- $secretName := include "atelier.managerSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingJwt := "" -}}
{{- $existingEnc := "" -}}
{{- if $existing -}}
{{- $existingJwt = index $existing.data "ATELIER_JWT_SECRET" | default "" -}}
{{- $existingEnc = index $existing.data "SANDBOX_SECRETS_KEY" | default "" -}}
{{- end -}}
{{- $jwtSecret := .Values.auth.jwtSecret | default "" -}}
{{- if and (eq $jwtSecret "") (ne $existingJwt "") -}}
{{- $jwtSecret = ($existingJwt | b64dec) -}}
{{- end -}}
{{- if eq $jwtSecret "" -}}
{{- $jwtSecret = randAlphaNum 32 -}}
{{- end -}}
{{- $encKey := .Values.secrets.encryptionKey | default "" -}}
{{- if and (eq $encKey "") (ne $existingEnc "") -}}
{{- $encKey = ($existingEnc | b64dec) -}}
{{- end -}}
{{- if eq $encKey "" -}}
{{- $encKey = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "atelier.systemNamespace" . }}
  labels:
    {{- include "atelier.labels" . | nindent 4 }}
type: Opaque
data:
  ATELIER_GITHUB_CLIENT_ID: {{ .Values.auth.github.clientId | b64enc | quote }}
  ATELIER_GITHUB_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | b64enc | quote }}
  ATELIER_JWT_SECRET: {{ $jwtSecret | b64enc | quote }}
  SANDBOX_SECRETS_KEY: {{ $encKey | b64enc | quote }}
  {{- if .Values.server.mcpToken }}
  ATELIER_MCP_TOKEN: {{ .Values.server.mcpToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.integrations.slack.enabled }}
  ATELIER_SLACK_BOT_TOKEN: {{ .Values.integrations.slack.botToken | b64enc | quote }}
  ATELIER_SLACK_SIGNING_SECRET: {{ .Values.integrations.slack.signingSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.integrations.github.enabled }}
  ATELIER_GITHUB_ACCESS_TOKEN: {{ .Values.integrations.github.accessToken | b64enc | quote }}
  ATELIER_GITHUB_WEBHOOK_SECRET: {{ .Values.integrations.github.webhookSecret | b64enc | quote }}
  {{- end }}
{{- end }}
