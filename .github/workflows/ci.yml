name: CI

on:
  push:
    branches: [main, kubernetes]
  pull_request:
    branches: [main, kubernetes]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Lint and format
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

  helm-lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.3"

      - name: Lint chart
        run: helm lint charts/atelier