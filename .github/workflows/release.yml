name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - kubernetes
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  MANAGER_IMAGE: ghcr.io/frak-id/atelier-manager
  DASHBOARD_IMAGE: ghcr.io/frak-id/atelier-dashboard
  AGENT_IMAGE: ghcr.io/frak-id/sandbox-agent

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Lint and format
        run: bun run check

      # - name: Typecheck
      #   run: bun run typecheck

  docker:
    needs: check
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: manager
            image_env: MANAGER_IMAGE
          - target: dashboard
            image_env: DASHBOARD_IMAGE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tag release)
        id: meta-tag
        if: github.ref_type == 'tag'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=

      - name: Docker metadata (nightly)
        id: meta-nightly
        if: github.ref_type == 'branch'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=nightly-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ github.ref_type == 'tag' && steps.meta-tag.outputs.tags || steps.meta-nightly.outputs.tags }}
          labels: ${{ github.ref_type == 'tag' && steps.meta-tag.outputs.labels || steps.meta-nightly.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent:
    needs: check
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl cross-compiler
        run: sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent-rust

      - name: Build agent binary
        working-directory: apps/agent-rust
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/sandbox-agent dist/sandbox-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tag release)
        id: meta-tag
        if: github.ref_type == 'tag'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=

      - name: Docker metadata (nightly)
        id: meta-nightly
        if: github.ref_type == 'branch'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=nightly-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent-rust
          push: true
          tags: ${{ github.ref_type == 'tag' && steps.meta-tag.outputs.tags || steps.meta-nightly.outputs.tags }}
          labels: ${{ github.ref_type == 'tag' && steps.meta-tag.outputs.labels || steps.meta-nightly.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    timeout-minutes: 10
    needs: check

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve chart version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "app_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-nightly" >> "$GITHUB_OUTPUT"
            echo "app_version=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.3"

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          helm package charts/atelier \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.app_version }}"

      - name: Push chart to GHCR
        run: helm push atelier-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/frak-id/charts

  release:
    needs: [docker, agent, helm]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            helm install atelier oci://ghcr.io/frak-id/charts/atelier \
              --version ${{ steps.version.outputs.version }} \
              --namespace atelier-system --create-namespace \
              --values values.production.yaml
            ```

            ## Docker Images

            ```bash
            docker pull ghcr.io/frak-id/atelier-manager:${{ steps.version.outputs.version }}
            docker pull ghcr.io/frak-id/atelier-dashboard:${{ steps.version.outputs.version }}
            docker pull ghcr.io/frak-id/sandbox-agent:${{ steps.version.outputs.version }}
            ```
