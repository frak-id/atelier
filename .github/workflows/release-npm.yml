name: Publish npm

on:
  push:
    branches:
      - main

# Avoid running multiple publishes in parallel for the same branch.
concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for OIDC trusted publishing (and provenance)

jobs:
  release:
    name: Version PR or publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required for changesets to compute the changelog history.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      # Trusted publishing requires npm CLI >= 11.5.1 + Node >= 22.14.
      # Node 24 ships with npm 11.x by default. `registry-url` writes the
      # registry to ~/.npmrc; auth is handled via OIDC at publish time.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run --filter @konfeature/opencode-atelier build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore(release): version @konfeature/opencode-atelier"
          title: "chore(release): version @konfeature/opencode-atelier"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
